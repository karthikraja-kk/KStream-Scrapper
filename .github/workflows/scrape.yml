name: Scrape

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      refresh_type:
        description: 'Refresh Type'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - custom
      target_year:
        description: 'Year (Only for Custom Refresh)'
        required: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Index Crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          REFRESH_TYPE: ${{ github.event.inputs.refresh_type || 'quick' }}
          TRIGGER_SOURCE: ${{ github.event_name == 'schedule' && 'Scheduled' || 'Manual' }}
          TARGET_YEAR: ${{ github.event.inputs.target_year }}
        run: node index-crawler.js

      - name: Run Detail Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node detail-scraper.js
