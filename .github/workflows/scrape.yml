name: Scrape

on:
  schedule:
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      target_year:
        description: 'Year folder to scrape (e.g., 2026, 2025)'
        required: true
        default: '2026'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Index Crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_YEAR: ${{ github.event.inputs.target_year || '2026' }}
        run: node index-crawler.js

      - name: Run Detail Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node detail-scraper.js
